<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Open Book</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#020617;color:#fff;}
header{text-align:center;padding:15px;font-size:22px;color:#38bdf8;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card{background:#0f172a;border-radius:12px;padding:10px;}
button{padding:10px;margin-top:5px;border:none;border-radius:10px;background:#38bdf8;}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;}
#loader{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;align-items:center;justify-content:center;}
</style>
</head>

<body>

<header>📚 Open Book</header>

<div style="padding:10px;">
<input id="titulo" placeholder="Título">
<input id="autor" placeholder="Autor">
<input type="file" id="pdf" accept="application/pdf">
<button onclick="uploadLivro()">Publicar</button>
</div>

<div class="grid" id="lista"></div>

<div id="loader">Processando...</div>

<script>
const firebaseConfig={
  apiKey:"SUA_API_KEY",
  databaseURL:"https://cintaslivro-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let livrosMap={};

// 🔥 CONFIG
const CHUNK_SIZE = 200000; // tamanho do pedaço (ajuste se quiser)

// 🔥 UPLOAD DIVIDIDO
function uploadLivro(){
  let titulo= tituloEl.value;
  let autor= autorEl.value;
  let file= pdf.files[0];

  if(!titulo || !autor || !file){
    alert("Preencha tudo!");
    return;
  }

  let reader=new FileReader();

  reader.onload=function(e){
    let base64 = e.target.result.split(",")[1];

    let partes = [];
    for(let i=0;i<base64.length;i+=CHUNK_SIZE){
      partes.push(base64.substring(i,i+CHUNK_SIZE));
    }

    let id = Date.now();

    let livro={
      id,
      titulo,
      autor,
      totalPartes: partes.length,
      capa:"https://via.placeholder.com/300x400?text=Livro"
    };

    db.ref("livros/"+id+"/info").set(livro);

    partes.forEach((p,i)=>{
      db.ref("livros/"+id+"/partes/"+i).set(p);
    });

    alert("Publicado!");
  };

  reader.readAsDataURL(file);
}

// 🔥 DOWNLOAD RECONSTRUINDO
function baixarLivro(id){
  loader.style.display="flex";

  db.ref("livros/"+id).once("value").then(snap=>{
    let data = snap.val();

    let partes = data.partes;
    let total = data.info.totalPartes;

    let base64="";

    for(let i=0;i<total;i++){
      base64 += partes[i];
    }

    const byteCharacters = atob(base64);
    const byteNumbers = new Array(byteCharacters.length);

    for (let i = 0; i < byteCharacters.length; i++) {
      byteNumbers[i] = byteCharacters.charCodeAt(i);
    }

    const blob = new Blob([new Uint8Array(byteNumbers)], {type: "application/pdf"});
    const url = URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download=data.info.titulo+".pdf";
    a.click();

    loader.style.display="none";
  });
}

// UI
function card(l){
  return `
  <div class="card">
    <b>${l.titulo}</b><br>
    ${l.autor}<br>
    <button onclick="baixarLivro(${l.id})">Baixar</button>
  </div>`;
}

function render(lista){
  document.getElementById("lista").innerHTML =
    lista.map(l=>card(l)).join("");
}

// carregar
function carregar(){
  db.ref("livros").on("value",snap=>{
    let lista=[];
    snap.forEach(i=>{
      let val=i.val();
      if(val.info){
        lista.push(val.info);
        livrosMap[val.info.id]=val.info;
      }
    });
    render(lista);
  });
}

carregar();

// refs
const tituloEl=document.getElementById("titulo");
const autorEl=document.getElementById("autor");
const pdf=document.getElementById("pdf");
const loader=document.getElementById("loader");
</script>

</body>
</html>
