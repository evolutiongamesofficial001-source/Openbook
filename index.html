<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Hub</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>

<style>

:root{
--bg:#0a0a0a;
--card:#141414;
--green:#00ff88;
--text:#e8e8e8;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Arial;
}

header{
padding:18px;
text-align:center;
font-size:22px;
color:var(--green);
font-weight:bold;
}

.container{
padding:15px;
padding-bottom:100px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.book{
background:var(--card);
border-radius:10px;
overflow:hidden;
animation:fade .4s;
}

.book img{
width:100%;
height:150px;
object-fit:cover;
}

.book-title{
padding:6px;
font-size:13px;
text-align:center;
}

button{
width:100%;
border:none;
background:var(--green);
padding:8px;
font-weight:bold;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:12px;
}

.tab{
flex:1;
padding:10px;
background:#111;
text-align:center;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:var(--green);
color:black;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
background:#111;
border:none;
border-radius:8px;
color:white;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
}

.reader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
}

.reader iframe{
flex:1;
border:none;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>
<body>

<header>📚 Book Hub</header>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="trocar('biblioteca',this)">🌎 Biblioteca</div>
<div class="tab" onclick="trocar('meus',this)">📚 Meus</div>
<div class="tab" onclick="trocar('publicar',this)">⬆️ Publicar</div>
</div>

<div id="biblioteca"></div>

<div id="meus" style="display:none"></div>

<div id="publicar" style="display:none">

<div class="card">

<h3>Publicar Livro</h3>

<input id="nome" placeholder="Nome do livro">

<input type="file" id="pdf" accept="application/pdf">

<button onclick="publicar()">Enviar Livro</button>

</div>

</div>

</div>

<div class="reader" id="reader">
<button onclick="fechar()">Fechar</button>
<iframe id="pdfFrame"></iframe>
</div>

<script>

const firebaseConfig={
databaseURL:"https://contas-3-174fb-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database().ref("bookhub")

let livros=[]

function trocar(sec,el){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

el.classList.add("active")

biblioteca.style.display="none"
meus.style.display="none"
publicar.style.display="none"

document.getElementById(sec).style.display="block"

}

function publicar(){

let nome=document.getElementById("nome").value

let file=document.getElementById("pdf").files[0]

if(!file)return alert("Escolha um PDF")

let reader=new FileReader()

reader.onload=e=>{

db.push({

nome:nome,
pdf:e.target.result,
data:Date.now()

})

alert("Livro publicado!")

}

reader.readAsDataURL(file)

}

db.on("value",snap=>{

livros=[]

snap.forEach(i=>{
let d=i.val()
d.id=i.key
livros.push(d)
})

render()

})

async function gerarCapa(pdf){

let loading=pdfjsLib.getDocument(pdf)

let doc=await loading.promise

let page=await doc.getPage(1)

let canvas=document.createElement("canvas")

let ctx=canvas.getContext("2d")

let viewport=page.getViewport({scale:1})

canvas.width=viewport.width
canvas.height=viewport.height

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise

return canvas.toDataURL()

}

async function render(){

let grid=document.createElement("div")
grid.className="grid"

for(let l of livros){

let capa=await gerarCapa(l.pdf)

let div=document.createElement("div")
div.className="book"

div.innerHTML=`

<img src="${capa}">

<div class="book-title">${l.nome}</div>

<button onclick="ler('${l.pdf}')">Ler</button>
<button onclick="salvar('${l.id}')">Salvar</button>

`

grid.appendChild(div)

}

biblioteca.innerHTML=""
biblioteca.appendChild(grid)

renderMeus()

}

function ler(pdf){

pdfFrame.src=pdf
reader.style.display="flex"

}

function fechar(){

reader.style.display="none"
pdfFrame.src=""

}

function salvar(id){

let biblio=JSON.parse(localStorage.getItem("bookhub_biblioteca")||"[]")

if(!biblio.includes(id)){

biblio.push(id)

localStorage.setItem("bookhub_biblioteca",JSON.stringify(biblio))

}

renderMeus()

}

function renderMeus(){

let ids=JSON.parse(localStorage.getItem("bookhub_biblioteca")||"[]")

let grid=document.createElement("div")
grid.className="grid"

livros.forEach(l=>{

if(!ids.includes(l.id))return

let div=document.createElement("div")

div.className="book"

div.innerHTML=`

<div class="book-title">${l.nome}</div>

<button onclick="ler('${l.pdf}')">Ler</button>

`

grid.appendChild(div)

})

meus.innerHTML=""
meus.appendChild(grid)

}

</script>

</body>
</html>
