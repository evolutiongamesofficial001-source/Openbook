<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Book</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
:root{
  --bg:#030712;
  --card:#0f172a;
  --yellow:#ffd60a;
  --blue:#38bdf8;
  --accent:#22c55e;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#020617,#030712);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:24px;
  color:var(--yellow);
  letter-spacing:1px;
}

/* NAV */
nav{
  display:flex;
  gap:8px;
  padding:10px;
}

nav button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  background:linear-gradient(45deg,var(--yellow),var(--blue));
  color:#000;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:14px;
  background:#020617;
  color:#fff;
  border:1px solid #111;
}

/* SECTION */
.section{padding:10px;}
.section h2{color:var(--blue);}

/* GRID */
.grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

/* CARD */
.card{
  min-width:160px;
  background:linear-gradient(145deg,#020617,#0f172a);
  border-radius:18px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 15px rgba(0,0,0,.7);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 0 25px rgba(56,189,248,.4);
}

.card img{width:100%;}

.title{padding:6px;font-size:13px;}

.genre{
  font-size:11px;
  padding:0 6px;
  color:var(--accent);
}

/* BADGE */
.badge{
  position:absolute;
  top:6px;
  left:6px;
  background:var(--yellow);
  color:#000;
  padding:3px 6px;
  border-radius:6px;
  font-size:11px;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:6px;
  right:6px;
  cursor:pointer;
}

/* STARS */
.stars{
  display:flex;
  justify-content:center;
}

.star{cursor:pointer;}

/* DOWNLOAD */
.download{
  margin:6px;
  padding:6px;
  text-align:center;
  border-radius:10px;
  background:linear-gradient(45deg,var(--yellow),var(--accent));
  color:#000;
  font-weight:bold;
}

/* BOTÃO PUBLICAR TOP */
.publishBtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(45deg,var(--blue),var(--yellow));
  color:#000;
  box-shadow:0 0 20px rgba(56,189,248,.6);
  transition:.3s;
}

.publishBtn:hover{
  transform:scale(1.05);
}

/* SCREEN */
.screen{display:none;}
.active{display:block;animation:fade .3s;}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<header>📚 Open Book</header>

<nav>
  <button onclick="trocar('home')">Explorar</button>
  <button onclick="trocar('geral')">Geral</button>
  <button onclick="trocar('upload')">Publicar</button>
</nav>

<!-- HOME -->
<div id="home" class="screen active">

  <div style="padding:10px;">
    <input id="search" placeholder="Buscar..." oninput="buscar()">
  </div>

  <div class="section">
    <h2>🔥 Trending</h2>
    <div class="grid" id="trending"></div>
  </div>

  <div class="section">
    <h2>🏆 Ranking</h2>
    <div class="grid" id="ranking"></div>
  </div>

</div>

<!-- GERAL -->
<div id="geral" class="screen">
  <div class="section">
    <h2>📚 Todos os livros</h2>
    <div class="grid" id="geralList"></div>
  </div>
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <div style="padding:15px;">
    <input id="titulo" placeholder="Título">
    <input id="autor" placeholder="Autor">
    <input id="ano" type="number" placeholder="Ano">

    <select id="publico">
      <option>livre</option>
      <option>jovem</option>
      <option>adulto</option>
    </select>

    <select id="genero">
      <option>Fantasia</option>
      <option>Romance</option>
      <option>Terror</option>
      <option>Ficção</option>
      <option>Ação</option>
      <option>Outro</option>
    </select>

    <input type="file" id="pdf" accept="application/pdf">

    <button class="publishBtn" onclick="uploadLivro()">🚀 Publicar Livro</button>
  </div>
</div>

<script>
// FIREBASE
const firebaseConfig={
  apiKey:"SUA_API_KEY",
  databaseURL:"https://cintaslivro-default-rtdb.firebaseio.com/",
  projectId:"cintaslivro",
  storageBucket:"cintaslivro.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const storage=firebase.storage();

let fav=JSON.parse(localStorage.getItem("fav"))||{};

// TROCAR
function trocar(t){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(t).classList.add("active");
}

// UPLOAD
async function uploadLivro(){
  let file=pdf.files[0];
  if(!file) return alert("Selecione PDF");

  let ref=storage.ref("livros/"+Date.now());
  await ref.put(file);

  let url=await ref.getDownloadURL();

  db.ref("livros").push({
    id:Date.now(),
    titulo:titulo.value,
    autor:autor.value,
    ano:ano.value,
    publico:publico.value,
    genero:genero.value,
    url,
    totalStars:0,
    votes:0,
    views:0
  });
}

// AVALIAR
function avaliar(id,n){
  db.ref("livros").once("value",snap=>{
    snap.forEach(i=>{
      let l=i.val();
      if(l.id==id){
        db.ref("livros/"+i.key).update({
          totalStars:(l.totalStars||0)+n,
          votes:(l.votes||0)+1
        });
      }
    });
  });
}

// VIEW
function addView(id){
  db.ref("livros").once("value",snap=>{
    snap.forEach(i=>{
      let l=i.val();
      if(l.id==id){
        db.ref("livros/"+i.key).update({
          views:(l.views||0)+1
        });
      }
    });
  });
}

// FAVORITO
function toggleFav(id){
  fav[id]=!fav[id];
  localStorage.setItem("fav",JSON.stringify(fav));
  carregar();
}

// CARD
function card(l,b){
  let media=l.votes?l.totalStars/l.votes:0;
  let f=fav[l.id]?"❤️":"🤍";

  return `
  <div class="card">
    ${b?`<div class="badge">${b}</div>`:""}
    <div class="fav" onclick="toggleFav(${l.id})">${f}</div>

    <img src="https://image.thum.io/get/pdf/${l.url}" onclick="addView(${l.id})">

    <div class="title">${l.titulo}</div>
    <div class="genre">${l.genero}</div>

    <div class="stars">
      ${[1,2,3,4,5].map(n=>`
        <span class="star" onclick="avaliar(${l.id},${n})">
          ${n<=Math.round(media)?"⭐":"☆"}
        </span>`).join("")}
    </div>

    <a href="${l.url}" download onclick="addView(${l.id})">
      <div class="download">⬇ Baixar</div>
    </a>
  </div>`;
}

// REALTIME
function carregar(){
  db.ref("livros").on("value",snap=>{
    let lista=[];

    snap.forEach(l=>{
      let v=l.val();
      v.media=v.votes?v.totalStars/v.votes:0;
      lista.push(v);
    });

    trending.innerHTML=[...lista]
      .sort((a,b)=>(b.views+b.media*10)-(a.views+a.media*10))
      .slice(0,10)
      .map(l=>card(l,"🔥")).join("");

    ranking.innerHTML=[...lista]
      .sort((a,b)=>b.media-a.media)
      .slice(0,10)
      .map((l,i)=>card(l,"#"+(i+1))).join("");

    geralList.innerHTML=lista.map(l=>card(l)).join("");
  });
}

// BUSCA
function buscar(){
  let t=search.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(t)?"block":"none";
  });
}

carregar();
</script>

</body>
</html>
